<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定期テスト英語重要フレーズ暗記アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
#app{max-width:560px;margin:0 auto;padding:1.5rem 1rem 3rem}
.screen{display:none}.screen.active{display:block}
h1{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:0.25rem;line-height:1.4}
.subtitle{font-size:13px;color:#666;margin-bottom:1.5rem}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
label{font-size:13px;color:#666;display:block;margin-bottom:6px}
select,input[type=text]{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;background:#fff;color:#1a1a1a;margin-bottom:1rem;-webkit-appearance:none;appearance:none}
select:focus,input[type=text]:focus{outline:none;border-color:#4a7cf0}
.btn{display:block;width:100%;padding:13px;border:1px solid #ddd;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;background:#fff;color:#1a1a1a;transition:background 0.15s;text-align:center}
.btn:hover{background:#f5f5f0}
.btn-primary{background:#4a7cf0;color:#fff;border-color:#4a7cf0}
.btn-primary:hover{background:#3a6ce0}
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:0.5rem}
.level-card{border:1px solid #e8e8e4;border-radius:10px;padding:1rem;cursor:pointer;background:#fff;transition:background 0.15s;text-align:center}
.level-card:hover:not(.locked){background:#f5f5f0}
.level-card.locked{opacity:0.4;cursor:not-allowed}
.level-card.cleared{border-color:#34c759;background:#f0fff4}
.level-num{font-size:22px;font-weight:600;color:#1a1a1a}
.level-desc{font-size:12px;color:#666;margin-top:4px}
.level-badge{font-size:11px;margin-top:6px;padding:2px 8px;border-radius:6px;display:inline-block}
.badge-cleared{background:#d4f5df;color:#1a7a3a}
.badge-locked{background:#f0f0ec;color:#999}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.q-info{font-size:13px;color:#666}
.progress-bar{height:4px;background:#e8e8e4;border-radius:4px;margin-bottom:1.5rem}
.progress-fill{height:4px;background:#4a7cf0;border-radius:4px;transition:width 0.3s}
.phrase-display{font-size:16px;line-height:2;color:#1a1a1a;margin-bottom:1.25rem;padding:1rem;background:#f5f5f0;border-radius:10px}
.blank{display:inline-block;min-width:90px;border-bottom:2px solid #4a7cf0;text-align:center;color:#4a7cf0;font-weight:600;padding:0 4px}
.ja-hint{font-size:13px;color:#666;margin-bottom:10px;padding:8px 12px;background:#f5f5f0;border-radius:8px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.choice-btn{padding:11px;border:1px solid #e8e8e4;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;color:#1a1a1a;transition:background 0.15s}
.choice-btn:hover{background:#f5f5f0}
.choice-btn.correct{background:#d4f5df;border-color:#34c759;color:#1a7a3a}
.choice-btn.wrong{background:#ffe5e5;border-color:#ff3b30;color:#c0392b}
.text-input-wrap{margin-bottom:1rem}
.text-input-wrap input{margin-bottom:0.5rem}
.feedback{font-size:14px;padding:10px 14px;border-radius:8px;margin-bottom:1rem;display:none;white-space:pre-line;line-height:1.6}
.feedback.show{display:block}
.feedback.ok{background:#d4f5df;color:#1a7a3a}
.feedback.ng{background:#ffe5e5;color:#c0392b}
.result-score{font-size:44px;font-weight:700;text-align:center;margin:1.25rem 0 0.25rem;color:#1a1a1a}
.result-label{font-size:14px;color:#666;text-align:center;margin-bottom:1.25rem}
.res-clear{font-size:14px;padding:10px 14px;background:#d4f5df;color:#1a7a3a;border-radius:8px;margin-bottom:1rem;text-align:center;display:none}
.notify-status{font-size:12px;color:#999;margin-top:0.5rem;text-align:center}
.id-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:1rem}
.id-row input{flex:1;margin-bottom:0}
.tag{display:inline-block;font-size:11px;padding:2px 10px;border-radius:6px;background:#f0f0ec;color:#666;margin-bottom:0.5rem}
.answer-area{min-height:50px;padding:10px 12px;border:1px dashed #ccc;border-radius:8px;font-size:14px;margin-bottom:8px;color:#1a1a1a;cursor:pointer;line-height:2;background:#fff}
.word-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.word-chip{padding:7px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;color:#1a1a1a;transition:opacity 0.1s;-webkit-tap-highlight-color:transparent}
.word-chip:hover{background:#f5f5f0}
.hint-note{font-size:11px;color:#999;margin-bottom:8px}
</style>
</head>
<body>
<div id="app">

<div id="screen-id" class="screen active">
  <h1>定期テスト英語<br>重要フレーズ暗記アプリ</h1>
  <p class="subtitle">松陰塾 宮前平校</p>
  <div class="card">
    <label>生徒ID（名前や番号など）</label>
    <div class="id-row">
      <input type="text" id="input-id" placeholder="例：田中たろう" autocomplete="off">
      <button class="btn btn-primary" onclick="goToSetup()" style="width:auto;padding:10px 20px">次へ</button>
    </div>
    <div style="font-size:12px;color:#999">進捗保存に使います。毎回同じIDを入力してください。</div>
  </div>
</div>

<div id="screen-setup" class="screen">
  <h1>テスト設定</h1>
  <p class="subtitle" id="setup-id-label"></p>
  <div class="card">
    <label>学年</label>
    <select id="sel-grade">
      <option value="中1">中学1年生</option>
      <option value="中2">中学2年生</option>
      <option value="中3" selected>中学3年生</option>
    </select>
    <label>学校</label>
    <select id="sel-school">
      <option value="宮中">宮前平中学校（宮中）</option>
    </select>
    <label>テスト</label>
    <select id="sel-test">
      <option value="前期中間" selected>前期中間テスト</option>
      <option value="前期期末">前期期末テスト</option>
      <option value="後期中間">後期中間テスト</option>
      <option value="学年末">学年末テスト</option>
    </select>
    <button class="btn btn-primary" onclick="goToLevelSelect()">レベル選択へ</button>
  </div>
</div>

<div id="screen-levels" class="screen">
  <h1>レベル選択</h1>
  <p class="subtitle" id="level-context"></p>
  <div class="level-grid">
    <div class="level-card" id="lc-1" onclick="startLevel(1)">
      <div class="level-num">Lv.1</div>
      <div class="level-desc">4択 空所補充</div>
      <div class="level-badge badge-cleared" id="lb-1" style="display:none">クリア済</div>
    </div>
    <div class="level-card locked" id="lc-2" onclick="startLevel(2)">
      <div class="level-num">Lv.2</div>
      <div class="level-desc">入力 空所補充</div>
      <div class="level-badge badge-locked" id="lb-2">Lv.1クリアで解放</div>
    </div>
    <div class="level-card locked" id="lc-3" onclick="startLevel(3)">
      <div class="level-num">Lv.3</div>
      <div class="level-desc">並べ替え問題</div>
      <div class="level-badge badge-locked" id="lb-3">Lv.2クリアで解放</div>
    </div>
    <div class="level-card locked" id="lc-max" onclick="startLevel(4)">
      <div class="level-num">Lv.MAX</div>
      <div class="level-desc">全文入力</div>
      <div class="level-badge badge-locked" id="lb-max">Lv.3クリアで解放</div>
    </div>
  </div>
  <div style="margin-top:1rem">
    <button class="btn" onclick="showScreen('screen-setup')">← テスト設定に戻る</button>
  </div>
</div>

<div id="screen-quiz" class="screen">
  <div class="q-header">
    <span class="q-info" id="q-label"></span>
    <span class="q-info" id="q-counter"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="q-progress"></div></div>
  <div id="q-content"></div>
  <div class="feedback" id="q-feedback"></div>
  <button class="btn btn-primary" id="q-next-btn" onclick="nextQuestion()" style="display:none;margin-top:0.5rem">次の問題へ</button>
</div>

<div id="screen-result" class="screen">
  <div class="card">
    <div class="tag" id="res-tag"></div>
    <div class="result-score" id="res-score"></div>
    <div class="result-label" id="res-label"></div>
    <div class="res-clear" id="res-clear-msg"></div>
    <div class="notify-status" id="notify-status"></div>
  </div>
  <button class="btn" onclick="retryLevel()" style="margin-bottom:10px">もう一度挑戦</button>
  <button class="btn btn-primary" onclick="showScreen('screen-levels')">レベル選択に戻る</button>
</div>

</div>

<script>
var WEBHOOK = "https://discordapp.com/api/webhooks/1512371851567829055/iK62fOT9C56UJ_HbL7xWMJ8F6ECAoKmSAl98rMYzv-pcS20Lr9iUVWr6knfxm_XGpS0e";

var PHRASES = [
  {en:"English is spoken as an official language.",ja:"英語は公用語として話されています。",keyword:"spoken",choices:["spoken","speaking","speaks","speak"],words:["English","is","spoken","as","an","official","language."]},
  {en:"Let me show you something interesting.",ja:"おもしろいものをお見せしましょう。",keyword:"show",choices:["show","showing","shown","shows"],words:["Let","me","show","you","something","interesting."]},
  {en:"This footprint will help us find the elephant.",ja:"この足跡は、私たちがゾウを見つけるのに役立ちます。",keyword:"find",choices:["find","to find","finding","found"],words:["This","footprint","will","help","us","find","the","elephant."]},
  {en:"Ms. Tsusi told us that you do conservation.",ja:"ツシ先生は、あなたが保護活動もしていることを私たちに教えてくれました。",keyword:"told",choices:["told","said","spoke","talked"],words:["Ms.","Tsusi","told","us","that","you","do","conservation."]},
  {en:"We have finally reached Kiyomizu-dera Temple.",ja:"私たちはようやく清水寺に到着しました。",keyword:"reached",choices:["reached","reach","reaches","reaching"],words:["We","have","finally","reached","Kiyomizu-dera","Temple."]},
  {en:"Have you checked your photos yet?",ja:"もう写真をチェックしましたか。",keyword:"yet",choices:["yet","already","just","never"],words:["Have","you","checked","your","photos","yet?"]},
  {en:"The bus hasn't left yet.",ja:"バスはまだ出発していません。",keyword:"hasn't",choices:["hasn't","didn't","won't","isn't"],words:["The","bus","hasn't","left","yet."]},
  {en:"I want you to help me.",ja:"私はあなたに手伝ってほしいです。",keyword:"want",choices:["want","tell","ask","need"],words:["I","want","you","to","help","me."]},
  {en:"That makes me nervous.",ja:"それは私を緊張させます。",keyword:"makes",choices:["makes","lets","helps","has"],words:["That","makes","me","nervous."]},
  {en:"We call our cat Felix.",ja:"私たちは自分たちのネコをフェリックスと呼びます。",keyword:"call",choices:["call","name","make","tell"],words:["We","call","our","cat","Felix."]},
  {en:"It was well received by everyone.",ja:"それはみんなから好評でした。",keyword:"received",choices:["received","accepted","taken","given"],words:["It","was","well","received","by","everyone."]},
  {en:"It's made of chocolate.",ja:"それはチョコレートでできています。",keyword:"made",choices:["made","built","created","formed"],words:["It's","made","of","chocolate."]}
];

var DATA = {"中3":{"宮中":{"前期中間":PHRASES}}};

var state = {
  studentId:"",grade:"",school:"",test:"",
  level:1,phrases:[],qIndex:0,score:0,answered:false,
  progress:{},sortSelected:[],sortRemaining:[]
};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goToSetup(){
  var id = document.getElementById('input-id').value.trim();
  if(!id){alert('生徒IDを入力してください');return;}
  state.studentId = id;
  var saved = localStorage.getItem('phraseApp_'+id);
  if(saved){try{state.progress=JSON.parse(saved);}catch(e){state.progress={};}}
  document.getElementById('setup-id-label').textContent = 'こんにちは、'+id+' さん';
  showScreen('screen-setup');
}

function saveProgress(){
  localStorage.setItem('phraseApp_'+state.studentId, JSON.stringify(state.progress));
}

function getKey(){return state.grade+'_'+state.school+'_'+state.test;}
function getCleared(){return state.progress[getKey()]||[];}

function goToLevelSelect(){
  state.grade = document.getElementById('sel-grade').value;
  state.school = document.getElementById('sel-school').value;
  state.test = document.getElementById('sel-test').value;
  document.getElementById('level-context').textContent = state.grade+' / '+state.school+' / '+state.test;
  updateLevelCards();
  showScreen('screen-levels');
}

function updateLevelCards(){
  var cleared = getCleared();
  [1,2,3,4].forEach(function(lv){
    var id = lv===4?'lc-max':'lc-'+lv;
    var bid = lv===4?'lb-max':'lb-'+lv;
    var el = document.getElementById(id);
    var bl = document.getElementById(bid);
    el.classList.remove('locked','cleared');
    bl.style.display = 'none';
    if(cleared.indexOf(lv)>=0){
      el.classList.add('cleared');
      bl.textContent='クリア済';bl.className='level-badge badge-cleared';bl.style.display='inline-block';
    } else if(lv>1 && cleared.indexOf(lv-1)<0){
      el.classList.add('locked');
      var msgs=['','Lv.1クリアで解放','Lv.2クリアで解放','Lv.3クリアで解放'];
      bl.textContent=msgs[lv-1];bl.className='level-badge badge-locked';bl.style.display='inline-block';
    }
  });
}

function startLevel(lv){
  var cleared = getCleared();
  if(lv>1 && cleared.indexOf(lv-1)<0)return;
  var phrases = DATA[state.grade]&&DATA[state.grade][state.school]&&DATA[state.grade][state.school][state.test];
  if(!phrases||phrases.length===0){alert('このテスト範囲のデータがまだ登録されていません。');return;}
  state.level=lv;
  state.phrases=phrases.slice().sort(function(){return Math.random()-0.5;});
  state.qIndex=0;state.score=0;state.answered=false;
  var lbls=['','4択 空所補充','入力 空所補充','並べ替え','全文入力'];
  document.getElementById('q-label').textContent=(lv===4?'Lv.MAX':'Lv.'+lv)+'：'+lbls[lv];
  showScreen('screen-quiz');
  renderQuestion();
}

function buildBlankPhrase(p){
  return p.words.map(function(w){
    var punct = w.match(/[.,!?]+$/) ? w.match(/[.,!?]+$/)[0] : '';
    var clean = w.replace(/[.,!?]/g,'').toLowerCase();
    var kclean = p.keyword.replace(/[.,!?]/g,'').toLowerCase();
    if(clean===kclean){
      return '<span class="blank">　　　　</span>'+punct;
    }
    return w;
  }).join(' ');
}

function renderQuestion(){
  var p = state.phrases[state.qIndex];
  var total = state.phrases.length;
  document.getElementById('q-counter').textContent=(state.qIndex+1)+'/'+total;
  document.getElementById('q-progress').style.width=Math.round((state.qIndex/total)*100)+'%';
  document.getElementById('q-feedback').className='feedback';
  document.getElementById('q-next-btn').style.display='none';
  state.answered=false;
  if(state.level===1)renderLv1(p);
  else if(state.level===2)renderLv2(p);
  else if(state.level===3)renderLv3(p);
  else renderLvMax(p);
}

function renderLv1(p){
  var shuffled = p.choices.slice().sort(function(){return Math.random()-0.5;});
  document.getElementById('q-content').innerHTML =
    '<div class="ja-hint">'+p.ja+'</div>'+
    '<div class="phrase-display">'+buildBlankPhrase(p)+'</div>'+
    '<div class="choices" id="choices-wrap"></div>';
  var wrap = document.getElementById('choices-wrap');
  shuffled.forEach(function(c){
    var btn = document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=c;
    btn.addEventListener('click',function(){checkLv1(btn,c,p.keyword);});
    wrap.appendChild(btn);
  });
}

function checkLv1(btn,chosen,correct){
  if(state.answered)return;
  state.answered=true;
  document.querySelectorAll('.choice-btn').forEach(function(b){b.disabled=true;});
  if(chosen===correct){
    btn.classList.add('correct');state.score++;
    showFeedback(true,'正解！\n'+state.phrases[state.qIndex].en);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(function(b){
      if(b.textContent===correct)b.classList.add('correct');
    });
    showFeedback(false,'不正解。正解は「'+correct+'」\n'+state.phrases[state.qIndex].en);
  }
  document.getElementById('q-next-btn').style.display='block';
}

function renderLv2(p){
  document.getElementById('q-content').innerHTML =
    '<div class="ja-hint">'+p.ja+'</div>'+
    '<div class="phrase-display">'+buildBlankPhrase(p)+'</div>'+
    '<div class="text-input-wrap">'+
    '<input type="text" id="lv2-input" placeholder="キーワードを入力..." autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">'+
    '<button class="btn btn-primary" onclick="checkLv2()">答え合わせ</button>'+
    '</div>';
  setTimeout(function(){var el=document.getElementById('lv2-input');if(el)el.focus();},100);
}

function checkLv2(){
  if(state.answered)return;
  var val = document.getElementById('lv2-input').value.trim().toLowerCase();
  var correct = state.phrases[state.qIndex].keyword.toLowerCase();
  state.answered=true;
  if(val===correct){
    state.score++;showFeedback(true,'正解！\n'+state.phrases[state.qIndex].en);
  } else {
    showFeedback(false,'不正解。正解は「'+state.phrases[state.qIndex].keyword+'」\n'+state.phrases[state.qIndex].en);
  }
  document.getElementById('q-next-btn').style.display='block';
}

function renderLv3(p){
  var shuffled = p.words.slice().sort(function(){return Math.random()-0.5;});
  state.sortSelected=[];state.sortRemaining=shuffled.slice();
  document.getElementById('q-content').innerHTML =
    '<div class="ja-hint">'+p.ja+'</div>'+
    '<div class="answer-area" id="sort-answer" onclick="removeLast()">（語句をタップして並べてください）</div>'+
    '<div class="hint-note">並べた語をタップすると最後の語を削除できます</div>'+
    '<div class="word-chips" id="sort-chips"></div>'+
    '<button class="btn btn-primary" onclick="checkLv3()">答え合わせ</button>';
  renderSortChips();
}

function renderSortChips(){
  var wrap=document.getElementById('sort-chips');if(!wrap)return;
  wrap.innerHTML='';
  state.sortRemaining.forEach(function(w,i){
    var span=document.createElement('span');
    span.className='word-chip';span.textContent=w;
    (function(idx){span.addEventListener('click',function(){selectWord(idx);});})(i);
    wrap.appendChild(span);
  });
  var ans=document.getElementById('sort-answer');
  if(ans)ans.textContent=state.sortSelected.join(' ')||'（語句をタップして並べてください）';
}

function selectWord(i){
  if(state.answered)return;
  state.sortSelected.push(state.sortRemaining[i]);
  state.sortRemaining.splice(i,1);
  renderSortChips();
}

function removeLast(){
  if(state.answered||state.sortSelected.length===0)return;
  state.sortRemaining.push(state.sortSelected.pop());
  renderSortChips();
}

function checkLv3(){
  if(state.answered)return;
  var p=state.phrases[state.qIndex];
  var answer=state.sortSelected.join(' ');
  var correct=p.words.join(' ');
  state.answered=true;
  if(answer===correct){state.score++;showFeedback(true,'正解！\n'+p.en);}
  else{showFeedback(false,'不正解。正解は：\n'+p.en);}
  document.getElementById('q-next-btn').style.display='block';
}

function renderLvMax(p){
  document.getElementById('q-content').innerHTML =
    '<div class="ja-hint">'+p.ja+'</div>'+
    '<div style="font-size:12px;color:#999;margin-bottom:12px">日本語を見て英文を全て書いてください</div>'+
    '<div class="text-input-wrap">'+
    '<input type="text" id="lvmax-input" placeholder="英文を入力..." autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">'+
    '<button class="btn btn-primary" onclick="checkLvMax()">答え合わせ</button>'+
    '</div>';
  setTimeout(function(){var el=document.getElementById('lvmax-input');if(el)el.focus();},100);
}

function checkLvMax(){
  if(state.answered)return;
  function norm(s){return s.trim().toLowerCase().replace(/[.,!?'"]/g,'').replace(/\s+/g,' ');}
  var val=norm(document.getElementById('lvmax-input').value);
  var correct=norm(state.phrases[state.qIndex].en);
  state.answered=true;
  if(val===correct){state.score++;showFeedback(true,'正解！');}
  else{showFeedback(false,'不正解。正解は：\n'+state.phrases[state.qIndex].en);}
  document.getElementById('q-next-btn').style.display='block';
}

function showFeedback(ok,msg){
  var el=document.getElementById('q-feedback');
  el.textContent=msg;el.className='feedback show '+(ok?'ok':'ng');
}

function nextQuestion(){
  state.qIndex++;
  if(state.qIndex>=state.phrases.length)showResult();
  else renderQuestion();
}

function showResult(){
  var total=state.phrases.length;
  var pct=Math.round(state.score/total*100);
  var cleared=pct>=80;
  var lvLabel=state.level===4?'MAX':state.level;
  document.getElementById('res-tag').textContent=state.grade+' / '+state.school+' / '+state.test+' / Lv.'+lvLabel;
  document.getElementById('res-score').textContent=state.score+'/'+total;
  document.getElementById('res-label').textContent='正答率 '+pct+'%'+(cleared?' ✓ クリア！':'　もう一度挑戦しよう！');
  var msg=document.getElementById('res-clear-msg');
  if(cleared){
    msg.style.display='block';
    msg.textContent='クリア！'+(state.level<4?'次のレベルが解放されました。':'全レベルコンプリート！');
    var k=getKey();
    if(!state.progress[k])state.progress[k]=[];
    if(state.progress[k].indexOf(state.level)<0)state.progress[k].push(state.level);
    saveProgress();
  } else {
    msg.style.display='none';
  }
  sendDiscord(pct,cleared);
  showScreen('screen-result');
}

function sendDiscord(pct,cleared){
  var lv=state.level===4?'MAX':state.level;
  var emoji=cleared?'🎉':'📝';
  var body=emoji+' **'+state.studentId+'** さんが挑戦しました\n'+
    '学年：'+state.grade+'　学校：'+state.school+'　テスト：'+state.test+'\n'+
    'レベル：Lv.'+lv+'　結果：'+state.score+'/'+state.phrases.length+'（'+pct+'%）'+
    (cleared?'\n✅ クリア！':'');
  fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({content:body})})
  .then(function(r){
    document.getElementById('notify-status').textContent=r.ok?'先生に結果を通知しました 📨':'通知の送信に失敗しました';
  })
  .catch(function(){
    document.getElementById('notify-status').textContent='通知の送信に失敗しました';
  });
}

function retryLevel(){startLevel(state.level);}

document.getElementById('input-id').addEventListener('keydown',function(e){
  if(e.key==='Enter')goToSetup();
});
</script>
