<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定期テスト英語重要フレーズ＆重要単語暗記アプリ｜松陰塾 宮前平校</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f2;
  --card:#ffffff;
  --border:#e4e2da;
  --text:#1c1c1a;
  --text2:#6b6860;
  --text3:#a8a59e;
  --blue:#3b6ef0;
  --blue-light:#eef1fe;
  --green:#22a862;
  --green-light:#e6f7ee;
  --red:#e03b3b;
  --red-light:#fdeaea;
  --yellow:#f5a623;
  --yellow-light:#fef6e6;
  --rank-s:#e8b84b;
  --rank-a:#7ec8e3;
  --rank-b:#b4b4b4;
  --radius:12px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{max-width:560px;margin:0 auto;padding:1.25rem 1rem 4rem}
.screen{display:none}.screen.active{display:block}

/* ヘッダー */
.app-header{text-align:center;margin-bottom:2rem;padding-top:0.5rem}
.app-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:0.02em}
.app-sub{font-size:12px;color:var(--text3);margin-top:3px}

/* カード */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}

/* フォーム */
label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px;letter-spacing:0.03em;text-transform:uppercase}
select,input[type=text]{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:var(--card);color:var(--text);margin-bottom:1rem;-webkit-appearance:none;appearance:none;font-family:inherit}
select:focus,input[type=text]:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light)}

/* ボタン */
.btn{display:block;width:100%;padding:13px;border:1px solid var(--border);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;background:var(--card);color:var(--text);transition:all 0.15s;text-align:center;font-family:inherit;letter-spacing:0.01em}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#2f5ed8}
.btn-sm{padding:8px 16px;font-size:13px;width:auto;display:inline-block}

/* ランクバッジ */
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;font-size:14px;font-weight:800;flex-shrink:0}
.rank-s{background:var(--rank-s);color:#fff}
.rank-a{background:var(--rank-a);color:#fff}
.rank-b{background:var(--rank-b);color:#fff}

/* ランク選択 */
.rank-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem}
.rank-card{border:1.5px solid var(--border);border-radius:10px;padding:1rem 0.5rem;cursor:pointer;background:var(--card);text-align:center;transition:all 0.15s}
.rank-card:hover:not(.locked){background:var(--bg);transform:translateY(-1px)}
.rank-card.locked{opacity:0.4;cursor:not-allowed}
.rank-card.cleared{border-color:var(--green);background:var(--green-light)}
.rank-card .rank-label{font-size:22px;font-weight:800;margin-bottom:4px}
.rank-card.s-card .rank-label{color:var(--rank-s)}
.rank-card.a-card .rank-label{color:var(--rank-a)}
.rank-card.b-card .rank-label{color:var(--rank-b)}
.rank-sub{font-size:11px;color:var(--text2);margin-top:2px}
.rank-status{font-size:10px;margin-top:6px;padding:2px 6px;border-radius:5px;display:inline-block}
.status-cleared{background:var(--green-light);color:var(--green)}
.status-locked{background:var(--bg);color:var(--text3)}

/* レベル選択 */
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.level-card{border:1.5px solid var(--border);border-radius:10px;padding:1rem;cursor:pointer;background:var(--card);text-align:center;transition:all 0.15s}
.level-card:hover:not(.locked){background:var(--bg)}
.level-card.locked{opacity:0.4;cursor:not-allowed}
.level-card.cleared{border-color:var(--green);background:var(--green-light)}
.level-num{font-size:20px;font-weight:700;color:var(--text)}
.level-desc{font-size:11px;color:var(--text2);margin-top:3px}
.level-status{font-size:10px;margin-top:5px;padding:2px 6px;border-radius:5px;display:inline-block}

/* クイズ画面 */
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.quiz-meta-left{display:flex;align-items:center;gap:8px}
.quiz-count{font-size:13px;color:var(--text2)}
.progress-wrap{height:5px;background:var(--border);border-radius:5px;margin-bottom:1.25rem}
.progress-bar{height:5px;background:var(--blue);border-radius:5px;transition:width 0.3s}

.ja-hint{font-size:17px;color:var(--text);font-weight:600;margin-bottom:10px;padding:10px 14px;background:var(--bg);border-radius:8px;line-height:1.6}
.phrase-box{font-size:16px;line-height:2.1;color:var(--text);margin-bottom:1.25rem;padding:1rem 1.25rem;background:var(--card);border:1px solid var(--border);border-radius:10px}
.blank{display:inline-block;min-width:80px;border-bottom:2.5px solid var(--blue);text-align:center;color:var(--blue);font-weight:700;padding:0 4px}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.choice-btn{padding:11px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;background:var(--card);color:var(--text);transition:all 0.15s;font-family:inherit;line-height:1.4}
.choice-btn:hover{background:var(--bg)}
.choice-btn.correct{background:var(--green-light);border-color:var(--green);color:var(--green)}
.choice-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}

.text-wrap{margin-bottom:1rem}
.text-wrap input{margin-bottom:0.5rem}

.feedback-box{font-size:14px;padding:12px 14px;border-radius:8px;margin-bottom:1rem;display:none;white-space:pre-line;line-height:1.6}
.feedback-box.show{display:block}
.feedback-ok{background:var(--green-light);color:var(--green)}
.feedback-ng{background:var(--red-light);color:var(--red)}

.grammar-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;background:var(--blue-light);color:var(--blue);margin-bottom:8px;font-weight:600}

/* 並べ替え */
.sort-answer{min-height:50px;padding:10px 14px;border:1.5px dashed var(--border);border-radius:8px;font-size:14px;margin-bottom:6px;color:var(--text);cursor:pointer;line-height:2;background:var(--card)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.chip{padding:7px 13px;border:1px solid var(--border);border-radius:7px;font-size:13px;cursor:pointer;background:var(--card);color:var(--text);transition:opacity 0.1s;-webkit-tap-highlight-color:transparent;font-family:inherit}
.chip:hover{background:var(--bg)}
.hint-note{font-size:11px;color:var(--text3);margin-bottom:8px}

/* 結果画面 */
.score-big{font-size:52px;font-weight:800;text-align:center;color:var(--text);margin:1rem 0 0.25rem;line-height:1}
.score-pct{font-size:16px;color:var(--text2);text-align:center;margin-bottom:0.5rem}
.clear-msg{font-size:14px;padding:10px 14px;border-radius:8px;margin:0.75rem 0;text-align:center;display:none}
.clear-ok{background:var(--green-light);color:var(--green);display:block}
.notify-status{font-size:12px;color:var(--text3);text-align:center;margin-top:0.5rem}

/* テスト直前モードバナー */
.exam-banner{background:linear-gradient(135deg,#e8b84b,#f5a623);color:#fff;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;display:none}
.exam-banner.show{display:block}
.exam-banner-title{font-size:15px;font-weight:700;margin-bottom:3px}
.exam-banner-sub{font-size:12px;opacity:0.85}

/* 名前表示 */
.user-chip{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 12px;margin-bottom:1rem}

/* セクション見出し */
.section-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:0.75rem;letter-spacing:0.04em;text-transform:uppercase}

.divider{height:1px;background:var(--border);margin:1rem 0}

/* 単語クイズ専用 */
.word-en{font-size:24px;font-weight:700;text-align:center;padding:1.5rem 1rem;color:var(--text)}
.word-ja{font-size:22px;font-weight:700;text-align:center;padding:1.5rem 1rem;color:var(--text)}
</style>
</head>
<body>
<div id="app">

<!-- ① 名前・学年・学校入力 -->
<div id="screen-entry" class="screen active">
  <div class="app-header">
    <div class="app-title">定期テスト英語<br>重要フレーズ＆重要単語暗記アプリ</div>
    <div class="app-sub">松陰塾 宮前平校</div>
  </div>
  <div class="card">
    <label>お名前</label>
    <input type="text" id="input-name" placeholder="例：田中たろう" autocomplete="off">
    <label>学年</label>
    <select id="sel-grade">
      <option value="中3" selected>中学3年生</option>
      <option value="中2">中学2年生</option>
      <option value="中1">中学1年生</option>
    </select>
    <label>学校</label>
    <select id="sel-school">
      <option value="宮中">宮前平中学校（宮中）</option>
      <option value="向中">向丘中学校（向中）</option>
      <option value="崎中">宮崎中学校（崎中）</option>
    </select>
    <label>テスト</label>
    <select id="sel-test">
      <option value="前期中間" selected>前期中間テスト</option>
      <option value="前期期末">前期期末テスト</option>
      <option value="後期中間">後期中間テスト</option>
      <option value="学年末">学年末テスト</option>
    </select>
    <button class="btn btn-primary" onclick="startApp()">はじめる</button>
  </div>
</div>

<!-- ② ランク選択 -->
<div id="screen-rank" class="screen">
  <div class="user-chip" id="user-chip"></div>
  <div class="card">
    <div class="section-title">ランク選択</div>
    <div class="rank-grid">
      <div class="rank-card s-card" id="rc-S" onclick="selectRank('S')">
        <div class="rank-label">S</div>
        <div class="rank-sub">最重要</div>
        <div class="rank-status" id="rs-S"></div>
      </div>
      <div class="rank-card a-card locked" id="rc-A" onclick="selectRank('A')">
        <div class="rank-label">A</div>
        <div class="rank-sub">重要</div>
        <div class="rank-status status-locked" id="rs-A">Sクリアで解放</div>
      </div>
      <div class="rank-card b-card locked" id="rc-B" onclick="selectRank('B')">
        <div class="rank-label">B</div>
        <div class="rank-sub">標準</div>
        <div class="rank-status status-locked" id="rs-B">Aクリアで解放</div>
      </div>
    </div>
    <div class="exam-banner" id="exam-banner">
      <div class="exam-banner-title">🔥 テスト直前モード 解放！</div>
      <div class="exam-banner-sub">Sランクを全て習得しました。直前モードで総仕上げ！</div>
    </div>
    <button class="btn" id="exam-mode-btn" onclick="startExamMode()" style="display:none;margin-bottom:8px;background:var(--yellow);color:#fff;border-color:var(--yellow)">🔥 テスト直前モードへ</button>
  </div>
</div>

<!-- ③ レベル選択 -->
<div id="screen-level" class="screen">
  <div class="user-chip" id="user-chip2"></div>
  <div class="card">
    <div class="section-title" id="level-context"></div>
    <div class="level-grid">
      <div class="level-card" id="lc-1" onclick="startQuiz(1)">
        <div class="level-num">Lv.1</div>
        <div class="level-desc">4択問題</div>
        <div class="level-status" id="ls-1"></div>
      </div>
      <div class="level-card locked" id="lc-2" onclick="startQuiz(2)">
        <div class="level-num">Lv.2</div>
        <div class="level-desc">穴埋め入力</div>
        <div class="level-status status-locked" id="ls-2">Lv.1クリアで解放</div>
      </div>
      <div class="level-card locked" id="lc-3" onclick="startQuiz(3)">
        <div class="level-num">Lv.3</div>
        <div class="level-desc">並べ替え</div>
        <div class="level-status status-locked" id="ls-3">Lv.2クリアで解放</div>
      </div>
      <div class="level-card locked" id="lc-4" onclick="startQuiz(4)">
        <div class="level-num">Lv.4</div>
        <div class="level-desc">全文入力</div>
        <div class="level-status status-locked" id="ls-4">Lv.3クリアで解放</div>
      </div>
    </div>
    <button class="btn" onclick="showScreen('screen-rank')" style="margin-top:0.5rem">← ランク選択に戻る</button>
  </div>
</div>

<!-- ④ クイズ画面 -->
<div id="screen-quiz" class="screen">
  <div class="quiz-meta">
    <div class="quiz-meta-left">
      <div class="rank-badge" id="q-rank-badge"></div>
      <span class="quiz-count" id="q-label"></span>
    </div>
    <span class="quiz-count" id="q-counter"></span>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="q-progress"></div></div>
  <div id="q-content"></div>
  <div class="feedback-box" id="q-feedback"></div>
  <button class="btn btn-primary" id="q-next-btn" onclick="nextQuestion()" style="display:none;margin-top:0.5rem">次の問題へ →</button>
</div>

<!-- ⑤ 結果画面 -->
<div id="screen-result" class="screen">
  <div class="card">
    <div class="section-title" id="res-tag"></div>
    <div class="score-big" id="res-score"></div>
    <div class="score-pct" id="res-pct"></div>
    <div class="clear-msg" id="res-clear"></div>
    <div class="notify-status" id="notify-status"></div>
  </div>
  <button class="btn" onclick="retryQuiz()" style="margin-bottom:8px">もう一度挑戦</button>
  <button class="btn btn-primary" onclick="showScreen('screen-level')">レベル選択に戻る</button>
  <button class="btn" onclick="showScreen('screen-rank')" style="margin-top:8px">ランク選択に戻る</button>
</div>

</div><!-- #app -->

      {id:"2wb04",en:"teammate",ja:"チームメイト",choices_en:["teammate","friend","partner","member"],choices_ja:["チームメイト","友達","パートナー","メンバー"]},
      {id:"2wb05",en:"abroad",ja:"海外に",choices_en:["abroad","away","outside","far"],choices_ja:["海外に","離れて","外に","遠くに"]},

      {id:"2wb07",en:"library",ja:"図書館",choices_en:["library","bookstore","school","museum"],choices_ja:["図書館","本屋","学校","博物館"]},
      {id:"2wb08",en:"advice",ja:"アドバイス",choices_en:["advice","idea","opinion","help"],choices_ja:["アドバイス","アイデア","意見","助け"]},

    ]
  }
};

function getDB(){
  return state.grade==="中2" ? DB_中2 : DB_中3;
}

/* ===================== 状態管理 ===================== */
var state={
  name:"",grade:"",school:"",test:"",
  rank:"S",level:1,
  questions:[],qIndex:0,score:0,answered:false,
  wrongIds:[],
  progress:{},
  sortSelected:[],sortRemaining:[],
  examMode:false
};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function saveProgress(){
  localStorage.setItem('quizApp_'+state.name, JSON.stringify(state.progress));
}

function getKey(){return state.grade+'_'+state.school+'_'+state.test;}
function getRankKey(rank){return getKey()+'_'+rank;}
function getLevelKey(rank,lv){return getKey()+'_'+rank+'_lv'+lv;}

function getClearedLevels(rank){return state.progress[getRankKey(rank)]||[];}
function getClearedRanks(){return state.progress[getKey()+'_ranks']||[];}

/* ===================== エントリー ===================== */
function startApp(){
  var name=document.getElementById('input-name').value.trim();
  if(!name){alert('お名前を入力してください');return;}
  state.name=name;
  state.grade=document.getElementById('sel-grade').value;
  state.school=document.getElementById('sel-school').value;
  state.test=document.getElementById('sel-test').value;
  var saved=localStorage.getItem('quizApp_'+name);
  if(saved){try{state.progress=JSON.parse(saved);}catch(e){state.progress={};}}
  document.getElementById('user-chip').textContent='👤 '+name+' / '+state.grade+' / '+state.school;
  document.getElementById('user-chip2').textContent='👤 '+name+' / '+state.grade+' / '+state.school;
  updateRankScreen();
  showScreen('screen-rank');
}

/* ===================== ランク画面 ===================== */
function updateRankScreen(){
  var clearedRanks=getClearedRanks();
  var ranks=['S','A','B'];
  ranks.forEach(function(r,i){
    var el=document.getElementById('rc-'+r);
    var st=document.getElementById('rs-'+r);
    el.classList.remove('locked','cleared');
    if(clearedRanks.indexOf(r)>=0){
      el.classList.add('cleared');
      st.textContent='クリア済';st.className='rank-status status-cleared';
    } else if(i>0 && clearedRanks.indexOf(ranks[i-1])<0){
      el.classList.add('locked');
      var lockMsgs=['','Sクリアで解放','Aクリアで解放'];
      st.textContent=lockMsgs[i];st.className='rank-status status-locked';
    } else {
      st.textContent='挑戦中';st.className='rank-status';st.style.background='var(--yellow-light)';st.style.color='var(--yellow)';
    }
  });
  // テスト直前モード
  var sCleared=clearedRanks.indexOf('S')>=0;
  document.getElementById('exam-banner').className='exam-banner'+(sCleared?' show':'');
  document.getElementById('exam-mode-btn').style.display=sCleared?'block':'none';
}

function selectRank(rank){
  var clearedRanks=getClearedRanks();
  var ranks=['S','A','B'];
  var idx=ranks.indexOf(rank);
  if(idx>0 && clearedRanks.indexOf(ranks[idx-1])<0)return;
  state.rank=rank;
  var badge=document.getElementById('lc-1').querySelector('.level-num');
  document.getElementById('level-context').textContent=rank+'ランク - レベルを選んでください';
  updateLevelCards(rank);
  showScreen('screen-level');
}

/* ===================== レベル画面 ===================== */
function updateLevelCards(rank){
  var cleared=getClearedLevels(rank);
  [1,2,3,4].forEach(function(lv){
    var el=document.getElementById('lc-'+lv);
    var st=document.getElementById('ls-'+lv);
    el.classList.remove('locked','cleared');
    st.style.display='none';
    if(cleared.indexOf(lv)>=0){
      el.classList.add('cleared');
      st.textContent='クリア済';st.className='level-status status-cleared';st.style.display='inline-block';
    } else if(lv>1 && cleared.indexOf(lv-1)<0){
      el.classList.add('locked');
      var msgs=['','Lv.1クリアで解放','Lv.2クリアで解放','Lv.3クリアで解放'];
      st.textContent=msgs[lv-1];st.className='level-status status-locked';st.style.display='inline-block';
    }
  });
}

/* ===================== 問題生成 ===================== */
function buildQuestions(rank){
  var phrases=getDB().phrases[rank]||[];
  var words=getDB().words[rank]||[];
  // フレーズ70%・単語30%
  var phraseCount=Math.ceil(phrases.length*0.7);
  var wordCount=Math.min(words.length, Math.floor(phrases.length*0.3));
  var shuffledP=phrases.slice().sort(function(){return Math.random()-0.5;}).slice(0,phraseCount);
  var shuffledW=words.slice().sort(function(){return Math.random()-0.5;}).slice(0,wordCount);
  // 間違えた問題を先頭に
  var wrongIds=state.wrongIds;
  var all=shuffledP.map(function(p){return {type:'phrase',data:p};})
    .concat(shuffledW.map(function(w){return {type:'word',data:w};}));
  all.sort(function(a,b){
    var aWrong=wrongIds.indexOf(a.data.id)>=0?0:1;
    var bWrong=wrongIds.indexOf(b.data.id)>=0?0:1;
    return aWrong-bWrong||Math.random()-0.5;
  });
  // 最大10問
  return all.slice(0,10);
}

function startQuiz(lv){
  var cleared=getClearedLevels(state.rank);
  if(lv>1 && cleared.indexOf(lv-1)<0)return;
  state.level=lv;
  state.questions=buildQuestions(state.rank);
  state.qIndex=0;state.score=0;state.answered=false;state.examMode=false;
  var lvLabels=['','4択問題','穴埋め入力','並べ替え','全文入力'];
  document.getElementById('q-label').textContent=state.rank+'ランク Lv.'+lv+'：'+lvLabels[lv];
  var badge=document.getElementById('q-rank-badge');
  badge.textContent=state.rank;badge.className='rank-badge rank-'+state.rank.toLowerCase();
  showScreen('screen-quiz');
  renderQuestion();
}

function startExamMode(){
  state.examMode=true;
  state.rank='S';
  state.level=3; // 並べ替えから
  state.questions=buildQuestions('S');
  state.qIndex=0;state.score=0;state.answered=false;
  document.getElementById('q-label').textContent='🔥 テスト直前モード';
  var badge=document.getElementById('q-rank-badge');
  badge.textContent='🔥';badge.className='rank-badge';badge.style.background='var(--yellow)';
  showScreen('screen-quiz');
  renderQuestion();
}

/* ===================== 問題描画 ===================== */
function renderQuestion(){
  var q=state.questions[state.qIndex];
  var total=state.questions.length;
  document.getElementById('q-counter').textContent=(state.qIndex+1)+'/'+total;
  document.getElementById('q-progress').style.width=Math.round((state.qIndex/total)*100)+'%';
  document.getElementById('q-feedback').className='feedback-box';
  document.getElementById('q-next-btn').style.display='none';
  state.answered=false;
  var lv=state.level;
  if(q.type==='phrase'){
    if(lv===1)renderPhraseLv1(q.data);
    else if(lv===2)renderPhraseLv2(q.data);
    else if(lv===3)renderPhraseLv3(q.data);
    else renderPhraseLv4(q.data);
  } else {
    if(lv===1||lv===2)renderWordLv1(q.data);
    else if(lv===3)renderWordLv2(q.data);
    else renderWordLv3(q.data);
  }
}

function buildBlank(p){
  var kclean=p.keyword.replace(/[.,!?]/g,'').toLowerCase();
  var html='';
  p.words.forEach(function(w,i){
    var punct=w.match(/[.,!?]+$/) ? w.match(/[.,!?]+$/)[0]:'';
    var clean=w.replace(/[.,!?]/g,'').toLowerCase();
    if(i>0)html+=' ';
    if(clean===kclean){html+='<span class="blank">　　　</span>'+punct;}
    else{html+=w;}
  });
  return html;
}

function grammarTag(g){
  return g?'<div class="grammar-tag">📌 '+g+'</div>':'';
}

/* フレーズ Lv1: 4択 */
function renderPhraseLv1(p){
  var shuffled=p.choices.slice().sort(function(){return Math.random()-0.5;});
  document.getElementById('q-content').innerHTML=
    grammarTag(p.grammar)+
    '<div class="ja-hint">'+p.ja+'</div>'+
    '<div class="phrase-box">'+buildBlank(p)+'</div>'+
    '<div class="choices" id="choices-wrap"></div>';
  var wrap=document.getElementById('choices-wrap');
  shuffled.forEach(function(c){
    var btn=document.createElement('button');
    btn.className='choice-btn';btn.textContent=c;
    btn.addEventListener('click',function(){checkPhraseLv1(btn,c,p);});
    wrap.appendChild(btn);
  });
}
function checkPhraseLv1(btn,chosen,p){
  if(state.answered)return;
  state.answered=true;
  document.querySelectorAll('.choice-btn').forEach(function(b){b.disabled=true;});
  if(chosen===p.keyword){
    btn.classList.add('correct');state.score++;
    removeWrong(p.id);
    showFeedback(true,'正解！\n'+p.en);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(function(b){if(b.textContent===p.keyword)b.classList.add('correct');});
    addWrong(p.id);
    showFeedback(false,'不正解。正解は「'+p.keyword+'」\n'+p.en+(p.grammar?'\n📌 '+p.grammar:''));
  }
  document.getElementById('q-next-btn').style.display='block';
}

/* フレーズ Lv2: 穴埋め入力 */
function renderPhraseLv2(p){
  document.getElementById('q-content').innerHTML=
    grammarTag(p.grammar)+
    '<div class="ja-hint">'+p.ja+'</div>'+
    '<div class="phrase-box">'+buildBlank(p)+'</div>'+
    '<div class="text-wrap"><input type="text" id="lv2-input" placeholder="キーワードを入力..." autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"><button class="btn btn-primary" onclick="checkPhraseLv2(\''+p.id+'\')">答え合わせ</button></div>';
  setTimeout(function(){var el=document.getElementById('lv2-input');if(el)el.focus();},100);
}
function checkPhraseLv2(pid){
  if(state.answered)return;
  var p=state.questions[state.qIndex].data;
  var val=document.getElementById('lv2-input').value.trim().toLowerCase();
  var correct=p.keyword.toLowerCase();
  state.answered=true;
  if(val===correct){
    state.score++;removeWrong(pid);showFeedback(true,'正解！\n'+p.en);
  } else {
    addWrong(pid);showFeedback(false,'不正解。正解は「'+p.keyword+'」\n'+p.en+(p.grammar?'\n📌 '+p.grammar:''));
  }
  document.getElementById('q-next-btn').style.display='block';
}

/* フレーズ Lv3: 並べ替え */
function renderPhraseLv3(p){
  var shuffled=p.words.slice().sort(function(){return Math.random()-0.5;});
  state.sortSelected=[];state.sortRemaining=shuffled.slice();
  document.getElementById('q-content').innerHTML=
    grammarTag(p.grammar)+
    '<div class="ja-hint">'+p.ja+'</div>'+
    '<div class="sort-answer" id="sort-answer" onclick="removeLast()">（語句をタップして並べてください）</div>'+
    '<div class="hint-note">並べた語をタップすると最後の語を削除できます</div>'+
    '<div class="chips" id="sort-chips"></div>'+
    '<button class="btn btn-primary" onclick="checkPhraseLv3(\''+p.id+'\')">答え合わせ</button>';
  renderSortChips();
}
function renderSortChips(){
  var wrap=document.getElementById('sort-chips');if(!wrap)return;
  wrap.innerHTML='';
  state.sortRemaining.forEach(function(w,i){
    var span=document.createElement('span');
    span.className='chip';span.textContent=w;
    (function(idx){span.addEventListener('click',function(){selectWord(idx);});})(i);
    wrap.appendChild(span);
  });
  var ans=document.getElementById('sort-answer');
  if(ans)ans.textContent=state.sortSelected.join(' ')||'（語句をタップして並べてください）';
}
function selectWord(i){
  if(state.answered)return;
  state.sortSelected.push(state.sortRemaining[i]);
  state.sortRemaining.splice(i,1);
  renderSortChips();
}
function removeLast(){
  if(state.answered||state.sortSelected.length===0)return;
  state.sortRemaining.push(state.sortSelected.pop());
  renderSortChips();
}
function checkPhraseLv3(pid){
  if(state.answered)return;
  var p=state.questions[state.qIndex].data;
  var answer=state.sortSelected.join(' ');
  var correct=p.words.join(' ');
  state.answered=true;
  if(answer===correct){state.score++;removeWrong(pid);showFeedback(true,'正解！\n'+p.en);}
  else{addWrong(pid);showFeedback(false,'不正解。正解は：\n'+p.en+(p.grammar?'\n📌 '+p.grammar:''));}
  document.getElementById('q-next-btn').style.display='block';
}

/* フレーズ Lv4: 全文入力 */
function renderPhraseLv4(p){
  document.getElementById('q-content').innerHTML=
    grammarTag(p.grammar)+
    '<div class="ja-hint">'+p.ja+'</div>'+
    '<div style="font-size:12px;color:var(--text3);margin-bottom:12px">日本語を見て英文を全て書いてください</div>'+
    '<div class="text-wrap"><input type="text" id="lv4-input" placeholder="英文を入力..." autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"><button class="btn btn-primary" onclick="checkPhraseLv4(\''+p.id+'\')">答え合わせ</button></div>';
  setTimeout(function(){var el=document.getElementById('lv4-input');if(el)el.focus();},100);
}
function checkPhraseLv4(pid){
  if(state.answered)return;
  var p=state.questions[state.qIndex].data;
  function norm(s){return s.trim().toLowerCase().replace(/[.,!?'"]/g,'').replace(/\s+/g,' ');}
  var val=norm(document.getElementById('lv4-input').value);
  var correct=norm(p.en);
  state.answered=true;
  if(val===correct){state.score++;removeWrong(pid);showFeedback(true,'正解！');}
  else{addWrong(pid);showFeedback(false,'不正解。正解は：\n'+p.en+(p.grammar?'\n📌 '+p.grammar:''));}
  document.getElementById('q-next-btn').style.display='block';
}

/* 単語 Lv1/2: 英→日 4択 */
function renderWordLv1(w){
  var shuffled=w.choices_ja.slice().sort(function(){return Math.random()-0.5;});
  document.getElementById('q-content').innerHTML=
    '<div class="word-en">'+w.en+'</div>'+
    '<div class="ja-hint" style="text-align:center;font-size:12px">日本語の意味を選んでください</div>'+
    '<div class="choices" id="choices-wrap" style="margin-top:0.75rem"></div>';
  var wrap=document.getElementById('choices-wrap');
  shuffled.forEach(function(c){
    var btn=document.createElement('button');
    btn.className='choice-btn';btn.textContent=c;
    btn.addEventListener('click',function(){checkWord(btn,c,w.ja,w.id);});
    wrap.appendChild(btn);
  });
}

/* 単語 Lv3: 日→英 4択 */
function renderWordLv2(w){
  var shuffled=w.choices_en.slice().sort(function(){return Math.random()-0.5;});
  document.getElementById('q-content').innerHTML=
    '<div class="word-ja">'+w.ja+'</div>'+
    '<div class="ja-hint" style="text-align:center;font-size:12px">英語を選んでください</div>'+
    '<div class="choices" id="choices-wrap" style="margin-top:0.75rem"></div>';
  var wrap=document.getElementById('choices-wrap');
  shuffled.forEach(function(c){
    var btn=document.createElement('button');
    btn.className='choice-btn';btn.textContent=c;
    btn.addEventListener('click',function(){checkWord(btn,c,w.en,w.id);});
    wrap.appendChild(btn);
  });
}

/* 単語 Lv4: 日→英 入力 */
function renderWordLv3(w){
  document.getElementById('q-content').innerHTML=
    '<div class="word-ja">'+w.ja+'</div>'+
    '<div class="text-wrap" style="margin-top:0.75rem"><input type="text" id="lv4-input" placeholder="英単語を入力..." autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false"><button class="btn btn-primary" onclick="checkWordInput(\''+w.en+'\',\''+w.id+'\')">答え合わせ</button></div>';
  setTimeout(function(){var el=document.getElementById('lv4-input');if(el)el.focus();},100);
}

function checkWord(btn,chosen,correct,id){
  if(state.answered)return;
  state.answered=true;
  document.querySelectorAll('.choice-btn').forEach(function(b){b.disabled=true;});
  if(chosen===correct){
    btn.classList.add('correct');state.score++;removeWrong(id);
    showFeedback(true,'正解！');
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(function(b){if(b.textContent===correct)b.classList.add('correct');});
    addWrong(id);showFeedback(false,'不正解。正解は「'+correct+'」');
  }
  document.getElementById('q-next-btn').style.display='block';
}
function checkWordInput(correct,id){
  if(state.answered)return;
  var val=document.getElementById('lv4-input').value.trim().toLowerCase();
  state.answered=true;
  if(val===correct.toLowerCase()){state.score++;removeWrong(id);showFeedback(true,'正解！');}
  else{addWrong(id);showFeedback(false,'不正解。正解は「'+correct+'」');}
  document.getElementById('q-next-btn').style.display='block';
}

/* ===================== フィードバック・ナビ ===================== */
function showFeedback(ok,msg){
  var el=document.getElementById('q-feedback');
  el.textContent=msg;el.className='feedback-box show '+(ok?'feedback-ok':'feedback-ng');
}
function addWrong(id){if(state.wrongIds.indexOf(id)<0)state.wrongIds.push(id);}
function removeWrong(id){state.wrongIds=state.wrongIds.filter(function(x){return x!==id;});}

function nextQuestion(){
  state.qIndex++;
  if(state.qIndex>=state.questions.length)showResult();
  else renderQuestion();
}

/* ===================== 結果 ===================== */
function showResult(){
  var total=state.questions.length;
  var pct=Math.round(state.score/total*100);
  var cleared=pct>=80;
  var lvLabel=state.level;
  document.getElementById('res-tag').textContent=
    (state.examMode?'🔥 テスト直前モード':state.rank+'ランク Lv.'+lvLabel)+' 結果';
  document.getElementById('res-score').textContent=state.score+'/'+total;
  document.getElementById('res-pct').textContent='正答率 '+pct+'%';

  var msg=document.getElementById('res-clear');
  msg.className='clear-msg';
  if(cleared && !state.examMode){
    msg.className='clear-msg clear-ok';
    // レベルクリア保存
    var rk=getRankKey(state.rank);
    if(!state.progress[rk])state.progress[rk]=[];
    if(state.progress[rk].indexOf(state.level)<0)state.progress[rk].push(state.level);
    // Lv4クリアでランククリア
    if(state.level===4){
      var crk=getKey()+'_ranks';
      if(!state.progress[crk])state.progress[crk]=[];
      if(state.progress[crk].indexOf(state.rank)<0)state.progress[crk].push(state.rank);
      msg.textContent='🎉 '+state.rank+'ランク Lv.'+state.level+' クリア！ランクを制覇しました！';
    } else {
      msg.textContent='🎉 クリア！Lv.'+(state.level+1)+' が解放されました。';
    }
    saveProgress();
    updateRankScreen();
    updateLevelCards(state.rank);
  } else if(!cleared){
    msg.className='clear-msg';msg.style.display='block';
    msg.style.background='var(--yellow-light)';msg.style.color='var(--yellow)';
    msg.textContent='もう少し！80%以上でクリアです。';
  }
  sendDiscord(pct,cleared);
  showScreen('screen-result');
}

function sendDiscord(pct,cleared){
  var lv=state.level;
  var emoji=cleared?'🎉':'📝';
  var mode=state.examMode?'テスト直前モード':(state.rank+'ランク Lv.'+lv);
  var body=emoji+' **'+state.name+'** さんが挑戦しました\n'+
    '学年：'+state.grade+'　学校：'+state.school+'　テスト：'+state.test+'\n'+
    'モード：'+mode+'　結果：'+state.score+'/'+state.questions.length+'（'+pct+'%）'+
    (cleared?'\n✅ クリア！':'');
  fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({content:body})})
  .then(function(r){
    document.getElementById('notify-status').textContent=r.ok?'先生に結果を通知しました 📨':'通知の送信に失敗しました';
  }).catch(function(){
    document.getElementById('notify-status').textContent='通知の送信に失敗しました';
  });
}

function retryQuiz(){
  if(state.examMode)startExamMode();
  else startQuiz(state.level);
}

/* Enterキー対応 */
document.getElementById('input-name').addEventListener('keydown',function(e){
  if(e.key==='Enter')startApp();
});
</script>
